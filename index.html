<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visionary | Professional Workspace</title>
  <link rel="stylesheet" href="vision-styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600&family=Jost:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;1,400&family=Mrs+Saint+Delafield&display=swap" rel="stylesheet">
</head>
<body data-theme="minimalist">

  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-mark">◈</span>
        <span class="logo-text">Visionary</span>
      </div>
    </div>

    <div class="sidebar-scroll">
      <div class="section-label">Workspace Theme</div>
      <div class="theme-grid">
        <div class="theme-dot minimalist active" data-theme="minimalist" title="Minimalist"></div>
        <div class="theme-dot midnight" data-theme="midnight" title="Midnight"></div>
        <div class="theme-dot rose" data-theme="rose" title="Rose Gold"></div>
        <div class="theme-dot forest" data-theme="forest" title="Forest"></div>
      </div>

      <div class="divider"></div>

      <div class="section-label">Projects</div>
      <div id="boardList" class="board-stack"></div>
      <button class="btn-primary" id="newBoardBtn">+ New Project</button>

      <div class="divider"></div>

      <div class="section-label">Library</div>
      <select id="libraryCategory" class="pro-select">
        <option value="pictures">Inspiration Gallery</option>
        <option value="templates">Text Templates</option>
      </select>
      <div id="libraryContent" class="library-container"></div>

      <div class="divider"></div>

      <details class="sidebar-details">
        <summary>Custom Elements</summary>
        <div class="custom-panel">
          <input type="text" id="imgUrl" placeholder="Image URL..." class="pro-input" />
          <textarea id="quoteText" placeholder="Your Mantra..." class="pro-input" rows="2"></textarea>
          <button class="btn-ghost wide" id="addCustomBtn">Add to Canvas</button>
        </div>
      </details>
    </div>

    <div class="sidebar-footer">
      <div class="action-row">
        <button class="btn-ghost small" id="clearBtn">Clear</button>
        <button class="btn-gold small" id="exportBtn">Export PNG</button>
      </div>
    </div>
  </aside>

  <main id="main">
    <div id="workspaceInfo">
      <h1 id="boardNameDisplay">Project Untitled</h1>
      <p class="workspace-hint">Drag items from Library and drop them here</p>
    </div>
    <div id="canvas"></div>
  </main>

  <div id="overlay" class="hidden"></div>
  <div id="newBoardModal" class="modal hidden">
    <h2>New Project</h2>
    <input type="text" id="newBoardName" placeholder="Board Name..." class="pro-input" />
    <div class="modal-actions">
      <button class="btn-ghost" id="cancelBoard">Cancel</button>
      <button class="btn-gold" id="confirmBoard">Create</button>
    </div>
  </div>

  <div id="contextMenu" class="hidden">
    <button id="ctxDelete">Delete</button>
    <button id="ctxFront">Bring to Front</button>
  </div>

  <script src="vision-script.js"></script>
</body>
</html>
